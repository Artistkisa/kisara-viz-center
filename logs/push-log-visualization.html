<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECS 推送日志 - 监控中心</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #8892b0;
            text-decoration: none;
        }
        .back-link:hover { color: #fff; }
        
        /* 状态概览 */
        .overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-card h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #8892b0;
        }
        .status-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .status-value.success { color: #00c853; }
        .status-value.warning { color: #ff9800; }
        .status-value.error { color: #ff1744; }
        .status-detail {
            font-size: 0.9rem;
            color: #8892b0;
        }
        
        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #8892b0;
            margin-top: 5px;
        }
        
        /* 日志表格 */
        .log-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .log-section h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        .log-table th,
        .log-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-table th {
            color: #8892b0;
            font-weight: normal;
            font-size: 0.9rem;
        }
        .log-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge.success { background: rgba(0, 200, 83, 0.2); color: #00c853; }
        .badge.warning { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
        .badge.error { background: rgba(255, 23, 68, 0.2); color: #ff1744; }
        
        /* 图表容器 */
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-container h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .chart-wrapper {
            height: 300px;
            position: relative;
        }
        
        .update-time {
            text-align: center;
            color: #8892b0;
            font-size: 0.9rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← 返回监控中心</a>
        <h1>📊 ECS 推送日志监控</h1>
        
        <!-- 状态概览 -->
        <div class="overview">
            <div class="status-card">
                <h2>🚀 推送服务状态</h2>
                <div class="status-value warning">
                    ⚠ 异常
                </div>
                <div class="status-detail">
                    最近推送: 无数据<br>
                    成功率: 0.0%
                </div>
            </div>
            <div class="status-card">
                <h2>💓 心跳监控状态</h2>
                <div class="status-value error">
                    ✗ 异常
                </div>
                <div class="status-detail">
                    最近检查: 无数据<br>
                    成功率: 0.0%
                </div>
            </div>
        </div>
        
        <!-- 推送统计 -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">总推送次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">成功推送</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">失败推送</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">24小时内推送</div>
            </div>
        </div>
        
        <!-- 最近推送记录 -->
        <div class="log-section">
            <h2>🚀 最近推送记录 (最近20条)</h2>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>状态</th>
                        <th>成功/总数</th>
                        <th>文件列表</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>
        
        <!-- 心跳监控记录 -->
        <div class="log-section">
            <h2>💓 心跳监控记录 (最近20条)</h2>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>状态</th>
                        <th>延迟</th>
                        <th>错误信息</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>
        
        <p class="update-time">最后更新: 2026-03-10 00:37:02 | 数据来源: ECS (47.116.201.2)</p>
    </div>
</body>
</html>
