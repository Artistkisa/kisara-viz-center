<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站运行状态监控 - 实时可用性监测 | Kisara 可视化中心</title>
    <meta name="description" content="Kisara 网站实时运行状态监控，包含主站和论坛的可用率、响应时间趋势分析，24小时不间断监测。">
    <meta name="keywords" content="网站监控,可用性监测,响应时间,服务器状态,网站运行状态">
    <link rel="canonical" href="https://monitor.kisara.info/website/website-visualization.html">
    <meta property="og:title" content="网站运行状态监控 - 实时监测">
    <meta property="og:description" content="网站可用率、响应时间实时监控">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://monitor.kisara.info/website/website-visualization.html">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #8892b0;
            text-decoration: none;
        }
        .back-link:hover { color: #fff; }
        .website-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
        }
        .website-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .website-name {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .status-online { background: rgba(0, 200, 83, 0.2); color: #00c853; }
        .status-offline { background: rgba(255, 23, 68, 0.2); color: #ff1744; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        .metric-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }
        .metric-label {
            font-size: 0.85rem;
            color: #8892b0;
            margin-top: 5px;
        }
        .chart-container {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            height: 200px;
        }
        .update-time {
            text-align: center;
            color: #8892b0;
            font-size: 0.9rem;
            margin-top: 30px;
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLQB2PE73Z"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JLQB2PE73Z');
    </script>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← 返回可视化中心</a>
        <h1>🌐 网站运行状态</h1>
        
        <!-- Kisara 主站 -->
        <div class="website-card">
            <div class="website-header">
                <span class="website-name">🌐 kisara.art (主站)</span>
                <span class="status status-online">
                    ● 在线
                </span>
            </div>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value">100.0%</div>
                    <div class="metric-label">24小时可用率</div>
                </div>
                <div class="metric">
                    <div class="metric-value">246ms</div>
                    <div class="metric-label">当前响应时间</div>
                </div>
                <div class="metric">
                    <div class="metric-value">667.0ms</div>
                    <div class="metric-label">平均响应时间</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="kisaraChart"></canvas>
            </div>
        </div>
        
        <!-- Kisara 论坛 -->
        <div class="website-card">
            <div class="website-header">
                <span class="website-name">💬 forum.kisara.art (论坛)</span>
                <span class="status status-online">
                    ● 在线
                </span>
            </div>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value">100.0%</div>
                    <div class="metric-label">24小时可用率</div>
                </div>
                <div class="metric">
                    <div class="metric-value">246ms</div>
                    <div class="metric-label">当前响应时间</div>
                </div>
                <div class="metric">
                    <div class="metric-value">415.0ms</div>
                    <div class="metric-label">平均响应时间</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="forumChart"></canvas>
            </div>
        </div>
        
        <p class="update-time">最后更新: 2026-03-08 05:35:01</p>
    </div>
    
    <script>
        const ctx1 = document.getElementById('kisaraChart').getContext('2d');
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ["17:00", "17:00", "17:30", "17:30", "18:00", "18:00", "18:30", "18:30", "19:00", "19:00", "19:30", "19:30", "20:00", "20:00", "20:30", "20:30", "21:00", "21:00", "21:30", "21:30"],
                datasets: [{
                    label: '响应时间 (ms)',
                    data: [958, 233, 872, 334, 977, 298, 799, 246, 1056, 261, 1007, 345, 859, 255, 782, 287, 942, 293, 642, 246],
                    borderColor: '#00c853',
                    backgroundColor: 'rgba(0, 200, 83, 0.1)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        ticks: { color: '#8892b0' },
                        title: { display: true, text: '响应时间 (ms)', color: '#8892b0' }
                    },
                    x: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        ticks: { color: '#8892b0', maxTicksLimit: 8 }
                    }
                }
            }
        });
        
        const ctx2 = document.getElementById('forumChart').getContext('2d');
        new Chart(ctx2, {
            type: 'line',
            data: {
                labels: ["17:00", "17:00", "17:30", "17:30", "18:00", "18:00", "18:30", "18:30", "19:00", "19:00", "19:30", "19:30", "20:00", "20:00", "20:30", "20:30", "21:00", "21:00", "21:30", "21:30"],
                datasets: [{
                    label: '响应时间 (ms)',
                    data: [369, 245, 331, 675, 286, 384, 677, 680, 729, 241, 233, 334, 298, 246, 261, 345, 255, 287, 293, 246],
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        ticks: { color: '#8892b0' },
                        title: { display: true, text: '响应时间 (ms)', color: '#8892b0' }
                    },
                    x: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        ticks: { color: '#8892b0', maxTicksLimit: 8 }
                    }
                }
            }
        });
    </script>
</body>
</html>
