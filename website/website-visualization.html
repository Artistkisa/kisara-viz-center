    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;

            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);

            -webkit-text-fill-color: transparent;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #8892b0;
            text-decoration: none;
        }
        .back-link:hover { color: #fff; }
        .website-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
        }
        .website-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .website-name { font-size: 1.3rem; font-weight: bold; }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .status-online { background: rgba(0, 200, 83, 0.2); color: #00c853; }
        .status-offline { background: rgba(255, 23, 68, 0.2); color: #ff1744; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        .metric-value { font-size: 1.8rem; font-weight: bold; color: #fff; }
        .metric-label { font-size: 0.85rem; color: #8892b0; margin-top: 5px; }
        .chart-container {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            height: 200px;
        }
        .update-time {
            text-align: center;
            color: #8892b0;
            font-size: 0.9rem;

<body>
    <div class="container">
        <a href="../" class="back-link">← 返回可视化中心</a>
        <h1>🌐 网站运行状态</h1>
        
        <div class="website-card">
            <div class="website-header">
                <span class="website-name">🌐 kisara.art (主站)</span>

                    ● 在线

            <div class="metrics">
                <div class="metric">
                    <div class="metric-value">100.0%</div>
                    <div class="metric-label">24小时可用率</div>
                </div>
                <div class="metric">
                    <div class="metric-value">1715ms</div>
                    <div class="metric-label">当前响应时间</div>
                </div>
                <div class="metric">
                    <div class="metric-value">2495.0ms</div>
                    <div class="metric-label">平均响应时间</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="kisaraChart"></canvas>
            </div>
        </div>
        
        <div class="website-card">
            <div class="website-header">
                <span class="website-name">💬 forum.kisara.art (论坛)</span>
                <span class="status status-online">
                    ● 在线
                </span>
            </div>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value">100.0%</div>
                    <div class="metric-label">24小时可用率</div>
                </div>
                <div class="metric">

                    <div class="metric-label">当前响应时间</div>

                    <div class="metric-label">平均响应时间</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="forumChart"></canvas>
            </div>
        </div>
        
        <p class="update-time">最后更新: 2026-05-21 10:03:33</p>
    </div>
    
    <script>
        const labels = ["08:31", "08:31", "08:41", "08:41", "08:51", "08:51", "09:01", "09:01", "09:11", "09:11", "09:21", "09:21", "09:31", "09:31", "09:41", "09:41", "09:51", "09:51", "10:01", "10:01"];
        const kisaraData = [1835, 1830, 2252, 1754, 1825, 1842, 1997, 1797, 2016, 1828, 1838, 1778, 2378, 1687, 16827, 7061, 2313, 1937, 1933, 1715];
        const forumData = [1929, 1813, 1726, 1721, 1757, 1666, 1827, 1677, 1831, 1829, 1830, 1754, 1842, 1797, 1828, 1778, 1687, 7061, 1937, 1715];
        
        new Chart(document.getElementById('kisaraChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '响应时间 (ms)',
                    data: kisaraData,
                    borderColor: '#00c853',
                    backgroundColor: 'rgba(0, 200, 83, 0.1)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0' }, title: { display: true, text: '响应时间 (ms)', color: '#8892b0' } },
                    x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0', maxTicksLimit: 8 } }
                }
            }
        });
        
        new Chart(document.getElementById('forumChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '响应时间 (ms)',
                    data: forumData,
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0' }, title: { display: true, text: '响应时间 (ms)', color: '#8892b0' } },
                    x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0', maxTicksLimit: 8 } }
                }
            }
        });
