    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "广州空气质量实时监控数据",

    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .card h3 { margin-bottom: 10px; color: #8892b0; font-size: 0.9rem; }
        .value { font-size: 2.5rem; font-weight: bold; }
        .unit { font-size: 1rem; color: #8892b0; }
        .level {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .level-good { background: #00c853; }
        .level-moderate { background: #ffd600; color: #000; }
        .level-unhealthy { background: #ff9100; }
        .level-bad { background: #ff1744; }
        .level-severe { background: #7b1fa2; }
        .level-unknown { background: #888; }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .info-box {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-left: 3px solid #667eea;
        }
        .info-box p { margin: 5px 0; color: #8892b0; font-size: 0.9rem; }
        .info-box strong { color: #fff; }
        .update-time {
            text-align: center;
            color: #8892b0;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #8892b0;
            text-decoration: none;
        }
        .back-link:hover { color: #fff; }
        @media (max-width: 600px) {
            .value { font-size: 2rem; }
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← 返回可视化中心</a>
        <h1>🌫️ 广州空气质量监控</h1>
        
        <div class="grid">
            <div class="card">
                <h3>AQI 空气质量指数</h3>
                <div class="value">27<span class="unit"></span></div>
                <span class="level level-good">优</span>
            </div>
            
            <div class="card">
                <h3>PM2.5</h3>
                <div class="value">18.0<span class="unit"> μg/m³</span></div>
            </div>
            
            <div class="card">
                <h3>PM10</h3>
                <div class="value">27.0<span class="unit"> μg/m³</span></div>
            </div>
            
            <div class="card">
                <h3>紫外线指数</h3>
                <div class="value">3.0<span class="unit"></span></div>
                <span class="level level-moderate">中等</span>
            </div>
        </div>
        
        <div class="info-box"><p><strong>首要污染物：</strong>None</p><p><strong>健康影响：</strong>空气质量令人满意，基本无空气污染。</p></div>
        
        <div class="chart-container">
            <canvas id="aqiChart"></canvas>
        </div>
        
        <div class="chart-container">
            <canvas id="pm25Chart"></canvas>
        </div>
        
        <div class="chart-container">
            <canvas id="pm10Chart"></canvas>
        </div>
        
        <p class="update-time">最后更新: 05-21 20:19 | 数据来源: 和风天气 | 更新频率: 每2小时</p>
    </div>
    
    <script>
        const labels = ["05-20 21:17", "05-20 22:19", "05-21 00:19", "05-21 02:19", "05-21 04:19", "05-21 06:19", "05-21 08:19", "05-21 10:19", "05-21 12:19", "05-21 14:19", "05-21 16:19", "05-21 18:19", "05-21 20:19"];
        const aqiData = [19, 21, 16, 11, 10, 11, 15, 21, 18, 15, 18, 19, 27];
        const pm25Data = [13.0, 15.0, 9.0, 5.0, 6.0, 5.0, 8.0, 12.0, 10.0, 8.0, 7.0, 12.0, 18.0];
        const pm10Data = [17.0, 18.0, 16.0, 10.0, 10.0, 9.0, 14.0, 21.0, 18.0, 13.0, 11.0, 18.0, 27.0];
        const uvData = [3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0, 3.0];
        
        // AQI 颜色映射
        function getAQIColor(value) {
            if (value <= 50) return '#00c853';
            if (value <= 100) return '#ffd600';
            if (value <= 150) return '#ff9100';
            if (value <= 200) return '#ff1744';
            if (value <= 300) return '#7b1fa2';
            return '#4a0000';
        }
        
        const aqiColors = aqiData.map(v => getAQIColor(v));
        
        new Chart(document.getElementById('aqiChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'AQI',
                    data: aqiData,
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    pointBackgroundColor: aqiColors,
                    pointRadius: 5,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: '24小时 AQI 趋势', color: '#fff', font: { size: 16 } },
                    legend: { labels: { color: '#8892b0' } }
                },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0' } },
                    x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0', maxRotation: 45 } }
                }
            }
        });
        
        new Chart(document.getElementById('pm25Chart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'PM2.5 (μg/m³)',
                    data: pm25Data,
                    borderColor: '#f093fb',
                    backgroundColor: 'rgba(240, 147, 251, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: '24小时 PM2.5 趋势', color: '#fff', font: { size: 16 } },
                    legend: { labels: { color: '#8892b0' } }
                },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0' } },
                    x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0', maxRotation: 45 } }
                }
            }
        });
        
        new Chart(document.getElementById('pm10Chart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'PM10 (μg/m³)',
                    data: pm10Data,
                    borderColor: '#4fc3f7',
                    backgroundColor: 'rgba(79, 195, 247, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: '24小时 PM10 趋势', color: '#fff', font: { size: 16 } },
                    legend: { labels: { color: '#8892b0' } }
                },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0' } },
                    x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8892b0', maxRotation: 45 } }
                }
            }
        });
    </script>
</body>
</html>
